<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boardgame Data Admin</title>
  <style>
    :root { --bg:#f4f5f3; --surface:#fff; --ink:#1f2421; --muted:#697169; --line:#d9ded9; --brand:#176b5b; --soft:#e6f1ec; --danger:#a43d34; --warn:#9a6817; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
    button,input,select,textarea { font:inherit; }
    button { min-height:36px; padding:7px 11px; border:1px solid var(--line); border-radius:6px; background:white; cursor:pointer; font-weight:700; }
    button.primary { color:white; background:var(--brand); border-color:var(--brand); }
    button.danger { color:var(--danger); }
    header { padding:14px 20px; border-bottom:1px solid var(--line); background:white; }
    .topbar,.toolbar,.actions { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    h1,h2,h3 { margin:0; letter-spacing:0; }
    h1 { font-size:21px; } h2 { font-size:19px; } h3 { font-size:15px; }
    .small { font-size:12px; } .muted { color:var(--muted); }
    .pill { display:inline-flex; align-items:center; min-height:24px; padding:3px 7px; margin:2px; border-radius:999px; background:#edf0ed; font-size:12px; }
    .pill.ok { color:var(--brand); background:var(--soft); } .pill.warn { color:var(--warn); background:#f7eedc; }
    .login { width:min(460px,calc(100% - 28px)); margin:56px auto; }
    .shell { display:grid; grid-template-columns:180px minmax(0,1fr); min-height:calc(100vh - 70px); }
    nav { padding:14px; border-right:1px solid var(--line); background:white; }
    .nav-button { width:100%; display:flex; justify-content:space-between; margin-bottom:7px; border-color:transparent; background:transparent; }
    .nav-button.active { color:var(--brand); background:var(--soft); }
    main { min-width:0; padding:20px; }
    .panel { padding:15px; margin:12px 0; border:1px solid var(--line); border-radius:7px; background:var(--surface); }
    .grid { display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:10px; }
    .col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-7{grid-column:span 7}.col-6{grid-column:span 6}.col-5{grid-column:span 5}.col-4{grid-column:span 4}.col-3{grid-column:span 3}
    label { display:block; margin-bottom:4px; color:var(--muted); font-size:12px; font-weight:700; }
    input,select,textarea { width:100%; min-height:38px; padding:7px 9px; border:1px solid var(--line); border-radius:6px; background:white; }
    textarea { min-height:76px; resize:vertical; }
    .checkbox-row { display:flex; align-items:center; gap:8px; font-size:13px; }
    .checkbox-row input { width:auto; min-height:auto; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { padding:9px 8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:11px; text-transform:uppercase; }
    .status-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .metric strong { display:block; font-size:22px; }
    .banner { padding:10px; margin:10px 0; border-radius:6px; background:var(--soft); color:var(--brand); font-size:13px; }
    .banner.error { background:#f8e7e5; color:var(--danger); }
    .empty { padding:22px; color:var(--muted); text-align:center; }
    #schemaList .small { overflow-wrap:anywhere; }
    .hidden { display:none !important; }
    .modal-backdrop { position:fixed; inset:0; z-index:20; display:grid; place-items:center; padding:18px; background:rgba(10,20,15,.45); }
    .modal { width:min(520px,100%); padding:18px; border-radius:7px; background:white; }
    .diff-row { display:flex; justify-content:space-between; gap:16px; padding:7px 0; border-bottom:1px solid var(--line); font-size:12px; }
    .segmented { display:inline-flex; gap:0; padding:3px; border:1px solid var(--line); border-radius:6px; background:var(--soft); }
    .segmented label { margin:0; padding:7px 10px; border-radius:4px; color:var(--muted); cursor:pointer; }
    .segmented label:has(input:checked) { background:white; color:var(--ink); box-shadow:0 1px 3px rgba(20,40,30,.12); }
    .segmented input { position:absolute; opacity:0; pointer-events:none; }
    .issue-list { display:grid; gap:8px; margin-top:12px; }
    .issue { display:grid; grid-template-columns:90px 150px 1fr auto; gap:10px; align-items:center; padding:10px; border:1px solid var(--line); border-radius:6px; }
    .issue .error { color:var(--danger); font-weight:700; }
    .issue .warning { color:#8a6200; font-weight:700; }
    @media(max-width:900px){.shell{grid-template-columns:1fr}nav{display:flex;flex-wrap:wrap;gap:6px;border-right:0;border-bottom:1px solid var(--line)}.nav-button{flex:1 1 92px;width:auto;white-space:nowrap}.grid{display:block}.grid>*{margin-bottom:10px}.status-row{grid-template-columns:1fr 1fr}.issue{grid-template-columns:1fr}.toolbar{align-items:flex-start}.segmented{display:grid}}
  </style>
</head>
<body>
  <header><div class="topbar"><div><h1>Boardgame Data Admin</h1><div class="small muted">보드게임 마스터 데이터 관리</div></div><div class="actions"><span id="authState" class="pill warn">토큰 필요</span><button id="logoutButton" class="danger hidden">로그아웃</button></div></div></header>
  <section id="loginView" class="login panel">
    <h2>관리자 토큰</h2><p class="small muted">Railway Variables의 ADMIN_TOKEN 값을 입력하세요. 현재 브라우저 세션에만 저장됩니다.</p><div id="loginNotice"></div>
    <form id="loginForm"><label for="tokenInput">X-Admin-Token</label><input id="tokenInput" type="password" autocomplete="current-password" required><div class="actions" style="margin-top:10px"><button class="primary" type="submit">접속</button></div></form>
  </section>
  <section id="appView" class="shell hidden">
    <nav aria-label="관리자 메뉴"><button class="nav-button active" data-tab="statusTab">상태 <span>01</span></button><button class="nav-button" data-tab="gamesTab">게임 <span>02</span></button><button class="nav-button" data-tab="qualityTab">품질 <span>03</span></button><button class="nav-button" data-tab="importsTab">CSV <span>04</span></button><button class="nav-button" data-tab="logsTab">로그 <span>05</span></button></nav>
    <main><div id="notice"></div>
      <section id="statusTab" class="tab-panel"><div class="toolbar"><h2>상태</h2><button id="refreshStatus">새로고침</button></div><div id="statusMetrics" class="status-row"></div><div class="panel"><h3>활성 스키마</h3><div id="schemaList" style="margin-top:10px"></div></div><div class="panel"><h3>운영 관측성</h3><div id="observabilityMetrics" class="status-row" style="margin-top:12px"></div></div></section>
      <section id="gamesTab" class="tab-panel hidden">
        <div class="toolbar"><h2>게임 데이터</h2><div class="actions"><input id="gameSearch" type="search" placeholder="게임명, ID, 별칭 검색" style="width:260px"><button id="newGameButton">새 게임</button><button id="refreshGames">새로고침</button></div></div>
        <div class="grid"><div class="col-7 panel"><h3>게임 목록</h3><div id="gamesTable" class="table-wrap" style="margin-top:12px"></div></div>
          <div class="col-5 panel"><h3 id="gameFormTitle">게임 생성</h3>
            <form id="gameForm" class="grid" style="margin-top:12px">
              <div class="col-6"><label>ID</label><input name="id" required></div><div class="col-6"><label>영문 이름</label><input name="nameEn"></div><div class="col-6"><label>한국어 이름</label><input name="nameKo" required></div>
              <div class="col-3"><label>최소 인원</label><input name="minPlayers" type="number" min="1" required></div><div class="col-3"><label>최대 인원</label><input name="maxPlayers" type="number" min="1" required></div>
              <div class="col-4"><label>평균 시간</label><input name="avgPlayTimeMinutes" type="number" min="1" required></div><div class="col-4"><label>난이도</label><select name="difficulty"><option value="easy">easy</option><option value="medium">medium</option><option value="hard">hard</option></select></div><div class="col-4"><label>장르</label><input name="genre" required></div>
              <div class="col-12"><label>짧은 설명</label><textarea name="shortDescription" required></textarea></div><div class="col-12"><label>규칙 요약</label><textarea name="rulesSummary" required></textarea></div>
              <div class="col-6"><label>태그, 쉼표 구분</label><input name="tags"></div><div class="col-6"><label>플레이 스타일</label><input name="playStyle" value="competitive"></div><div class="col-12"><label>이미지 URL</label><input name="imageUrl" type="url"></div><div class="col-6"><label>이미지 출처</label><input name="imageSource"></div><div class="col-6"><label>이미지 라이선스</label><input name="imageLicense"></div><div class="col-12"><label>이미지 대체 텍스트</label><input name="imageAlt"></div><div class="col-12"><label>데이터 출처 URL</label><input name="dataSourceUrl" type="url"></div><div class="col-4"><label>데이터 라이선스</label><input name="dataLicense"></div><div class="col-4"><label>문구 라이선스</label><input name="contentLicense"></div><div class="col-4"><label>검토일</label><input name="reviewedAt" type="date"></div><div class="col-6"><label>검토자</label><input name="reviewedBy"></div>
              <div class="col-6 checkbox-row"><input name="isBeginnerFriendly" type="checkbox"><span>초보자 추천</span></div><div class="col-6 checkbox-row"><input name="isKidFriendly" type="checkbox"><span>아이 가능</span></div><div class="col-6 checkbox-row"><input name="isPartyGame" type="checkbox"><span>파티 게임</span></div><div class="col-6 checkbox-row"><input name="isStrategyGame" type="checkbox"><span>전략 게임</span></div>
              <div id="aliasCreateField" class="col-12"><label>초기 별칭, 쉼표 구분</label><input name="aliases"></div><div class="col-12 actions"><button class="primary" type="submit">저장</button><button id="resetGameForm" type="button">초기화</button></div>
            </form>
            <div id="qualityPanel" class="hidden" style="margin-top:18px"><h3>별칭</h3><div id="aliasList" style="margin-top:8px"></div><div class="actions"><input id="newAliasInput" placeholder="새 별칭"><button id="addAliasButton">추가</button></div>
              <h3 style="margin-top:18px">게임 관계</h3><div id="relationList" style="margin-top:8px"></div><div class="grid"><div class="col-6"><label>대상 게임</label><select id="relationTarget"></select></div><div class="col-6"><label>관계 유형</label><select id="relationType"><option value="similar">similar</option><option value="heavier_alternative">heavier_alternative</option><option value="family_alternative">family_alternative</option></select></div><div class="col-12"><button id="addRelationButton">관계 추가</button></div></div>
            </div>
          </div></div>
      </section>
      <section id="qualityTab" class="tab-panel hidden"><div class="toolbar"><h2>데이터 품질</h2><button id="refreshQuality">새로고침</button></div><div id="qualityMetrics" class="status-row"></div><div class="panel"><div class="toolbar"><h3>발견된 문제</h3><span id="qualityAllowed" class="small muted"></span></div><div id="qualityIssues" class="issue-list"></div></div></section>
      <section id="importsTab" class="tab-panel hidden"><div class="toolbar"><h2>CSV 가져오기·내보내기</h2><div class="actions"><button id="exportGames">게임 CSV</button><button id="exportAliases">별칭 CSV</button></div></div><div class="panel"><div class="actions"><input id="csvFile" type="file" accept=".csv,text/csv"><button id="previewCsv" class="primary">미리보기</button></div><div id="importMetrics" class="status-row" style="margin-top:12px"></div><div id="importRows" class="table-wrap" style="margin-top:12px"></div><div id="importApplyControls" class="toolbar hidden" style="margin-top:12px"><div class="segmented" aria-label="적용 방식"><label><input type="radio" name="importStrategy" value="all_or_nothing" checked>전체 검증 후 적용</label><label><input type="radio" name="importStrategy" value="valid_only">유효 행만 적용</label></div><button id="applyCsv" class="primary">적용</button></div></div></section>
      <section id="logsTab" class="tab-panel hidden"><div class="toolbar"><h2>운영 로그</h2><button id="refreshLogs">새로고침</button></div><div class="panel"><h3>관리자 감사 로그</h3><div id="auditLogs" class="table-wrap"></div></div><div class="panel"><h3>최근 인식</h3><div id="recognitionLogs" class="table-wrap"></div></div><div class="grid"><div class="col-6 panel"><h3>최근 추천</h3><div id="recommendationLogs" class="table-wrap"></div></div><div class="col-6 panel"><h3>최근 이벤트</h3><div id="eventLogs" class="table-wrap"></div></div></section>
    </main>
  </section>
  <div id="confirmModal" class="modal-backdrop hidden" role="dialog" aria-modal="true"><div class="modal"><h2 id="modalTitle">변경 확인</h2><p id="modalMessage" class="muted"></p><div id="modalDiff"></div><div class="actions" style="margin-top:12px"><button id="modalConfirm" class="primary">적용</button><button id="modalCancel">취소</button></div></div></div>
  <script>
    const API_BASE_URL = window.BOARDGAME_API_BASE_URL || location.origin;
    const TOKEN_KEY = 'boardgameAdminToken';
    const state = { token:sessionStorage.getItem(TOKEN_KEY)||'', games:[], selectedGameId:null, searchTimer:null, importPreview:null };
    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const tagsFromInput = (value) => String(value||'').split(',').map((item)=>item.trim()).filter(Boolean);
    const toNumber = (value) => Number.isFinite(Number(value)) ? Number(value) : 0;

    function setNotice(message,type='info'){ $('notice').innerHTML=message?'<div class="banner '+(type==='error'?'error':'')+'">'+escapeHtml(message)+'</div>':''; }
    function setAuthenticated(token){ state.token=token; if(token)sessionStorage.setItem(TOKEN_KEY,token);else sessionStorage.removeItem(TOKEN_KEY); $('loginView').classList.toggle('hidden',!!token); $('appView').classList.toggle('hidden',!token); $('logoutButton').classList.toggle('hidden',!token); $('authState').textContent=token?'인증됨':'토큰 필요'; $('authState').className='pill '+(token?'ok':'warn'); }
    async function api(path,options={}){ const headers=Object.assign({'X-Admin-Token':state.token},options.headers||{}); if(options.body&&!(options.body instanceof FormData))headers['Content-Type']='application/json'; const response=await fetch(API_BASE_URL+path,Object.assign({},options,{headers})); if(response.status===401){setAuthenticated('');throw new Error('관리자 토큰을 확인해 주세요.');} if(!response.ok){let message='요청 실패';try{const detail=(await response.json()).detail;if(typeof detail==='string')message=detail;else if(detail?.message)message=detail.message+(detail.errors?.length?' '+detail.errors.join(' '):'')}catch{}throw new Error(message)} return response.json(); }
    async function publicApi(path){const response=await fetch(API_BASE_URL+path);if(!response.ok)throw new Error('상태 조회 실패');return response.json()}

    function switchTab(id){ document.querySelectorAll('.tab-panel').forEach((panel)=>panel.classList.toggle('hidden',panel.id!==id)); document.querySelectorAll('.nav-button').forEach((button)=>button.classList.toggle('active',button.dataset.tab===id)); if(id==='statusTab')loadStatus();if(id==='gamesTab')loadGames();if(id==='qualityTab')loadQuality();if(id==='logsTab')loadLogs(); }
    const metric=(label,value)=>'<div class="panel metric"><strong>'+escapeHtml(value)+'</strong><span class="small muted">'+escapeHtml(label)+'</span></div>';
    async function loadStatus(){try{const [health,ready,schema,observability]=await Promise.all([publicApi('/health'),publicApi('/ready'),publicApi('/meta/schema'),api('/admin/observability')]);$('statusMetrics').innerHTML=[metric('서비스 상태',health.status||'unknown'),metric('준비 상태',ready.status||'unknown'),metric('게임',health.seedGames||0),metric('이미지 인식',health.imageRecognition?.mode||'unknown')].join('');$('schemaList').innerHTML='<p class="small muted">'+escapeHtml(health.database||'')+'</p>'+(schema.tables||[]).map((name)=>'<span class="pill">'+escapeHtml(name)+'</span>').join('');$('observabilityMetrics').innerHTML=[metric('전체 요청',observability.requests),metric('제한 요청',observability.rateLimited),metric('Vision 실패율',Math.round((observability.vision?.failureRate||0)*100)+'%'),metric('Fallback 비율',Math.round((observability.vision?.fallbackRate||0)*100)+'%')].join('')}catch(error){setNotice(error.message,'error')}}
    async function loadGames(){try{const q=$('gameSearch').value.trim();const data=await api('/admin/games'+(q?'?q='+encodeURIComponent(q):''));state.games=data.items||[];renderGames()}catch(error){setNotice(error.message,'error')}}
    function renderGames(){if(!state.games.length){$('gamesTable').innerHTML='<div class="empty">게임이 없습니다.</div>';return}$('gamesTable').innerHTML='<table><thead><tr><th>ID</th><th>이름</th><th>조건</th><th></th></tr></thead><tbody>'+state.games.map((game)=>'<tr><td>'+escapeHtml(game.id)+'</td><td><strong>'+escapeHtml(game.nameKo)+'</strong><div class="small muted">'+escapeHtml(game.nameEn||'')+'</div></td><td>'+game.minPlayers+'-'+game.maxPlayers+'명 · '+game.avgPlayTimeMinutes+'분 · '+escapeHtml(game.difficulty)+'</td><td><button data-edit-game="'+escapeHtml(game.id)+'">수정</button></td></tr>').join('')+'</tbody></table>';document.querySelectorAll('[data-edit-game]').forEach((button)=>button.onclick=()=>editGame(button.dataset.editGame));}
    function fillForm(form,values){Array.from(form.elements).forEach((field)=>{if(!field.name)return;if(field.type==='checkbox')field.checked=!!values[field.name];else if(values[field.name]!==undefined&&values[field.name]!==null)field.value=Array.isArray(values[field.name])?values[field.name].join(', '):values[field.name];else if(!['button','submit'].includes(field.type))field.value=''})}
    function editGame(id){const game=state.games.find((item)=>item.id===id);if(!game)return;state.selectedGameId=id;$('gameFormTitle').textContent='게임 수정';$('aliasCreateField').classList.add('hidden');fillForm($('gameForm'),game);$('gameForm').elements.id.disabled=true;$('qualityPanel').classList.remove('hidden');renderAliases(game);renderRelations(game);}
    function resetGameForm(){state.selectedGameId=null;$('gameFormTitle').textContent='게임 생성';$('gameForm').reset();$('gameForm').elements.id.disabled=false;$('gameForm').elements.playStyle.value='competitive';$('aliasCreateField').classList.remove('hidden');$('qualityPanel').classList.add('hidden');}
    function gamePayload(){const form=$('gameForm');const data=Object.fromEntries(new FormData(form).entries());return{id:(state.selectedGameId||data.id||'').trim(),nameKo:data.nameKo.trim(),nameEn:data.nameEn.trim()||null,shortDescription:data.shortDescription.trim(),rulesSummary:data.rulesSummary.trim(),minPlayers:toNumber(data.minPlayers),maxPlayers:toNumber(data.maxPlayers),avgPlayTimeMinutes:toNumber(data.avgPlayTimeMinutes),difficulty:data.difficulty,genre:data.genre.trim(),tags:tagsFromInput(data.tags),isBeginnerFriendly:form.elements.isBeginnerFriendly.checked,isKidFriendly:form.elements.isKidFriendly.checked,isPartyGame:form.elements.isPartyGame.checked,isStrategyGame:form.elements.isStrategyGame.checked,playStyle:data.playStyle.trim()||'competitive',imageUrl:data.imageUrl.trim()||null,imageSource:data.imageSource.trim()||null,imageLicense:data.imageLicense.trim()||null,imageAlt:data.imageAlt.trim()||null,dataSourceUrl:data.dataSourceUrl.trim()||null,dataLicense:data.dataLicense.trim()||null,contentLicense:data.contentLicense.trim()||null,reviewedAt:data.reviewedAt.trim()||null,reviewedBy:data.reviewedBy.trim()||null,aliases:tagsFromInput(data.aliases)}}
    function confirmAction(title,message,diff,action){$('modalTitle').textContent=title;$('modalMessage').textContent=message;$('modalDiff').innerHTML=diff||'';$('confirmModal').classList.remove('hidden');$('modalConfirm').onclick=async()=>{$('confirmModal').classList.add('hidden');await action()};}
    async function saveGame(event){event.preventDefault();const payload=gamePayload();if(!payload.id||!payload.nameKo||!payload.shortDescription||!payload.rulesSummary||!payload.genre)return setNotice('필수 필드를 입력해 주세요.','error');if(payload.minPlayers<1||payload.maxPlayers<payload.minPlayers||payload.avgPlayTimeMinutes<1)return setNotice('인원과 시간을 확인해 주세요.','error');const isUpdate=!!state.selectedGameId;const previous=isUpdate?state.games.find((item)=>item.id===state.selectedGameId):null;const body=Object.assign({},payload);delete body.id;if(isUpdate)delete body.aliases;const changed=Object.keys(body).filter((key)=>JSON.stringify(previous?.[key]??null)!==JSON.stringify(body[key]??null));const diff=changed.length?changed.map((key)=>'<div class="diff-row"><strong>'+escapeHtml(key)+'</strong><span>'+escapeHtml(JSON.stringify(previous?.[key]??null))+' → '+escapeHtml(JSON.stringify(body[key]??null))+'</span></div>').join(''):'<div class="diff-row"><strong>변경 없음</strong><span></span></div>';confirmAction(isUpdate?'게임 수정':'게임 생성',payload.nameKo+' 데이터를 저장합니다.',diff,async()=>{try{await api(isUpdate?'/admin/games/'+encodeURIComponent(state.selectedGameId):'/admin/games',{method:isUpdate?'PATCH':'POST',body:JSON.stringify(isUpdate?body:payload)});setNotice('게임 저장 완료');resetGameForm();await loadGames()}catch(error){setNotice(error.message,'error')}})}
    function renderAliases(game){$('aliasList').innerHTML=(game.aliases||[]).map((alias)=>'<span class="pill">'+escapeHtml(alias.alias)+' <button class="danger" data-delete-alias="'+alias.id+'">삭제</button></span>').join('')||'<div class="empty">별칭이 없습니다.</div>';document.querySelectorAll('[data-delete-alias]').forEach((button)=>button.onclick=()=>deleteAlias(button.dataset.deleteAlias));}
    async function addAlias(){const alias=$('newAliasInput').value.trim();if(!alias||!state.selectedGameId)return;try{await api('/admin/games/'+encodeURIComponent(state.selectedGameId)+'/aliases',{method:'POST',body:JSON.stringify({alias})});await reloadSelected()}catch(error){setNotice(error.message,'error')}}
    function deleteAlias(id){confirmAction('별칭 삭제','선택한 별칭을 삭제합니다.','<div class="diff-row"><strong>ID</strong><span>'+escapeHtml(id)+'</span></div>',async()=>{try{await api('/admin/games/'+encodeURIComponent(state.selectedGameId)+'/aliases/'+id,{method:'DELETE'});await reloadSelected()}catch(error){setNotice(error.message,'error')}})}
    function renderRelations(game){$('relationList').innerHTML=(game.relations||[]).map((relation)=>'<span class="pill">'+escapeHtml(relation.relationType)+' → '+escapeHtml(relation.targetNameKo)+' <button class="danger" data-delete-relation="'+relation.id+'">삭제</button></span>').join('')||'<div class="empty">등록된 관계가 없습니다.</div>';$('relationTarget').innerHTML=state.games.filter((item)=>item.id!==game.id).map((item)=>'<option value="'+escapeHtml(item.id)+'">'+escapeHtml(item.nameKo+' ('+item.id+')')+'</option>').join('');document.querySelectorAll('[data-delete-relation]').forEach((button)=>button.onclick=()=>deleteRelation(button.dataset.deleteRelation));}
    async function addRelation(){const targetGameId=$('relationTarget').value;const relationType=$('relationType').value;if(!targetGameId||!state.selectedGameId)return;try{await api('/admin/games/'+encodeURIComponent(state.selectedGameId)+'/relations',{method:'POST',body:JSON.stringify({targetGameId,relationType})});await reloadSelected()}catch(error){setNotice(error.message,'error')}}
    function deleteRelation(id){confirmAction('관계 삭제','선택한 게임 관계를 삭제합니다.','<div class="diff-row"><strong>ID</strong><span>'+escapeHtml(id)+'</span></div>',async()=>{try{await api('/admin/games/'+encodeURIComponent(state.selectedGameId)+'/relations/'+id,{method:'DELETE'});await reloadSelected()}catch(error){setNotice(error.message,'error')}})}
    async function reloadSelected(){const id=state.selectedGameId;await loadGames();editGame(id);}
    function renderTable(headers,rows){if(!rows.length)return'<div class="empty">표시할 항목이 없습니다.</div>';return'<table><thead><tr>'+headers.map((header)=>'<th>'+escapeHtml(header)+'</th>').join('')+'</tr></thead><tbody>'+rows.map((row)=>'<tr>'+row.map((cell)=>'<td>'+escapeHtml(cell)+'</td>').join('')+'</tr>').join('')+'</tbody></table>'}
    async function loadQuality(){try{const data=await api('/admin/data-quality');$('qualityMetrics').innerHTML=[metric('품질 점수',data.summary.score),metric('오류',data.summary.errors),metric('경고',data.summary.warnings),metric('게임',data.summary.games)].join('');$('qualityAllowed').textContent='난이도 '+data.allowedValues.difficulty.join(', ')+' · 장르 '+data.allowedValues.genre.join(', ');if(!data.issues.length){$('qualityIssues').innerHTML='<div class="empty">발견된 문제가 없습니다.</div>';return}$('qualityIssues').innerHTML=data.issues.map((issue)=>{const gameId=(issue.relatedIds||[])[0]||(issue.entityType==='game'?issue.entityId:'');const actions=(issue.resolutionActions||[]).map((action)=>'<button class="danger" data-quality-action="'+escapeHtml(action.kind)+'" data-quality-id="'+escapeHtml(action.id)+'">'+escapeHtml(action.label)+'</button>').join('');return'<div class="issue"><span class="'+escapeHtml(issue.severity)+'">'+escapeHtml(issue.severity)+'</span><strong>'+escapeHtml(issue.type)+'</strong><div><div>'+escapeHtml(issue.message)+'</div><div class="small muted">'+escapeHtml(issue.entityType+' · '+issue.entityId)+'</div></div><div class="actions">'+(gameId?'<button data-quality-game="'+escapeHtml(gameId)+'">게임 열기</button>':'')+actions+'</div></div>'}).join('');document.querySelectorAll('[data-quality-game]').forEach((button)=>button.onclick=()=>openQualityGame(button.dataset.qualityGame));document.querySelectorAll('[data-quality-action]').forEach((button)=>button.onclick=()=>resolveQualityIssue(button.dataset.qualityAction,button.dataset.qualityId))}catch(error){setNotice(error.message,'error')}}
    function resolveQualityIssue(kind,id){const path=kind==='delete_alias'?'/admin/data-quality/aliases/':'/admin/data-quality/relations/';confirmAction('품질 문제 해결','선택한 충돌 데이터를 삭제합니다.','<div class="diff-row"><strong>ID</strong><span>'+escapeHtml(id)+'</span></div>',async()=>{try{await api(path+encodeURIComponent(id),{method:'DELETE'});setNotice('품질 문제를 해결했습니다.');await loadQuality()}catch(error){setNotice(error.message,'error')}})}
    async function openQualityGame(gameId){switchTab('gamesTab');await loadGames();editGame(gameId)}
    function renderImportPreview(data){state.importPreview=data;$('importMetrics').innerHTML=[metric('전체 행',data.summary.totalRows),metric('유효',data.summary.validRows),metric('오류',data.summary.invalidRows),metric('변경',data.summary.creates+data.summary.updates)].join('');$('importRows').innerHTML=renderTable(['행','게임','작업','검증','변경 필드'],data.rows.map((row)=>[row.rowNumber,row.gameId||'-',row.action,row.valid?'통과':row.errors.join(' / '),Object.keys(row.diff||{}).join(', ')||'-']));$('importApplyControls').classList.remove('hidden')}
    async function previewCsv(){const file=$('csvFile').files[0];if(!file)return setNotice('CSV 파일을 선택해 주세요.','error');const form=new FormData();form.append('file',file);try{renderImportPreview(await api('/admin/imports/games/preview',{method:'POST',body:form}));setNotice('CSV 미리보기를 만들었습니다.')}catch(error){setNotice(error.message,'error')}}
    function applyCsv(){if(!state.importPreview)return;const strategy=document.querySelector('input[name="importStrategy"]:checked').value;const summary=state.importPreview.summary;confirmAction('CSV 적용','미리보기 결과를 데이터베이스에 반영합니다.','<div class="diff-row"><strong>생성</strong><span>'+summary.creates+'</span></div><div class="diff-row"><strong>수정</strong><span>'+summary.updates+'</span></div><div class="diff-row"><strong>오류 행</strong><span>'+summary.invalidRows+'</span></div>',async()=>{try{const result=await api('/admin/imports/games/apply',{method:'POST',body:JSON.stringify({importId:state.importPreview.importId,strategy})});setNotice('CSV 적용 완료: '+result.changedCount+'개 게임 변경');state.importPreview=null;$('importMetrics').innerHTML='';$('importRows').innerHTML='';$('importApplyControls').classList.add('hidden');await loadGames()}catch(error){setNotice(error.message,'error')}})}
    async function downloadExport(path,filename){try{const response=await fetch(API_BASE_URL+path,{headers:{'X-Admin-Token':state.token}});if(!response.ok)throw new Error('내보내기에 실패했습니다.');const url=URL.createObjectURL(await response.blob());const anchor=document.createElement('a');anchor.href=url;anchor.download=filename;anchor.click();URL.revokeObjectURL(url)}catch(error){setNotice(error.message,'error')}}
    async function loadLogs(){try{const [recognitions,recommendations,events,audits]=await Promise.all([api('/admin/recognitions'),api('/admin/recommendations'),api('/admin/events'),api('/admin/audit-events')]);$('auditLogs').innerHTML=renderTable(['시간','작업','대상','요약 필드'],audits.items.map((item)=>[item.createdAt,item.action,(item.entityType||'-')+' '+(item.entityId||''),Object.keys(item.summary||{}).join(', ')]));$('recognitionLogs').innerHTML=renderTable(['시간','상태','후보','확정','힌트'],recognitions.items.map((item)=>[item.createdAt,item.status,item.topGameId||'-',item.confirmedGameId||'-',item.hintPresent?'있음':'없음']));$('recommendationLogs').innerHTML=renderTable(['시간','인원','분위기','결과'],recommendations.items.map((item)=>[item.createdAt,item.request.peopleCount||'-',item.request.mood||'-',item.itemCount]));$('eventLogs').innerHTML=renderTable(['시간','이벤트','게임','payload keys'],events.items.map((item)=>[item.createdAt,item.eventType,item.gameId||'-',item.payloadKeys.join(', ')]))}catch(error){setNotice(error.message,'error')}}

    $('loginForm').onsubmit=async(event)=>{event.preventDefault();setAuthenticated($('tokenInput').value);try{await api('/admin/games?limit=1');$('tokenInput').value='';switchTab('statusTab')}catch(error){setAuthenticated('');$('loginNotice').innerHTML='<div class="banner error">'+escapeHtml(error.message)+'</div>'}};
    $('logoutButton').onclick=()=>setAuthenticated('');$('modalCancel').onclick=()=>$('confirmModal').classList.add('hidden');document.querySelectorAll('.nav-button').forEach((button)=>button.onclick=()=>switchTab(button.dataset.tab));$('refreshStatus').onclick=loadStatus;$('refreshGames').onclick=loadGames;$('newGameButton').onclick=resetGameForm;$('resetGameForm').onclick=resetGameForm;$('gameForm').onsubmit=saveGame;$('addAliasButton').onclick=addAlias;$('addRelationButton').onclick=addRelation;$('refreshQuality').onclick=loadQuality;$('previewCsv').onclick=previewCsv;$('applyCsv').onclick=applyCsv;$('exportGames').onclick=()=>downloadExport('/admin/exports/games.csv','boardgames.csv');$('exportAliases').onclick=()=>downloadExport('/admin/exports/aliases.csv','boardgame-aliases.csv');$('refreshLogs').onclick=loadLogs;$('gameSearch').oninput=()=>{clearTimeout(state.searchTimer);state.searchTimer=setTimeout(loadGames,250)};
    setAuthenticated(state.token);if(state.token)switchTab('statusTab');
  </script>
</body>
</html>
