<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보드게임 탐색기</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --surface: #ffffff;
      --ink: #1d2420;
      --muted: #657068;
      --line: #dbe1dc;
      --brand: #176b5b;
      --brand-dark: #104c41;
      --accent: #e9b949;
      --soft: #e6f1ec;
      --danger: #a93d32;
      --shadow: 0 8px 24px rgba(24, 44, 35, 0.09);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    .app { width: min(100%, 520px); min-height: 100vh; margin: 0 auto; padding-bottom: 84px; }
    header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; background: rgba(244, 246, 243, 0.96); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .status { font-size: 12px; font-weight: 800; color: var(--brand-dark); }
    main { padding: 14px; }
    .view { display: none; }
    .view.active { display: block; }
    .hero { min-height: 230px; display: flex; flex-direction: column; justify-content: flex-end; padding: 22px; border-radius: 8px; color: white; background: linear-gradient(145deg, #123c34 0%, #176b5b 58%, #d6a52f 100%); box-shadow: var(--shadow); }
    .hero h2 { margin: 0; max-width: 380px; font-size: 29px; line-height: 1.2; letter-spacing: 0; }
    .hero p { margin: 10px 0 0; max-width: 390px; line-height: 1.55; font-size: 14px; }
    .actions, .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .actions { margin-top: 16px; }
    .primary, .secondary, .ghost, .toggle { min-height: 42px; padding: 9px 12px; border-radius: 8px; font-weight: 800; }
    .primary { background: var(--brand); color: white; }
    .secondary { background: var(--accent); color: #2b2415; }
    .ghost, .toggle { background: #edf1ed; color: var(--brand-dark); }
    .toggle.active { background: var(--brand); color: white; }
    .panel, .card { padding: 14px; margin: 12px 0; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 2px 0 10px; }
    .section-title h2, .section-title h3 { margin: 0; font-size: 17px; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card h3 { margin: 0 0 4px; font-size: 17px; }
    .card p { margin: 8px 0; }
    .score { flex: 0 0 auto; min-width: 54px; padding: 5px 8px; border-radius: 999px; background: var(--soft); color: var(--brand-dark); text-align: center; font-size: 12px; font-weight: 900; }
    .badge { display: inline-flex; min-height: 24px; align-items: center; padding: 3px 7px; margin: 3px 3px 0 0; border-radius: 999px; background: #edf1ed; color: #344139; font-size: 12px; font-weight: 700; }
    label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 12px; font-weight: 800; }
    input, select { width: 100%; min-height: 42px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: white; color: var(--ink); }
    .form-grid { display: grid; gap: 10px; }
    .filters { margin-top: 10px; }
    .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .scan-stage { min-height: 190px; display: grid; place-items: center; padding: 20px; border: 2px dashed #9aafa2; border-radius: 8px; text-align: center; background: #f9fbf9; }
    .scan-stage strong { display: block; margin-bottom: 7px; font-size: 18px; }
    .notice { padding: 10px; margin: 10px 0; border-radius: 8px; background: var(--soft); color: var(--brand-dark); font-size: 13px; line-height: 1.45; }
    .notice.error { background: #f7e8e5; color: var(--danger); }
    .empty { padding: 28px 10px; color: var(--muted); text-align: center; line-height: 1.55; }
    .detail-head { padding: 18px; border-radius: 8px; background: #123c34; color: white; }
    .detail-head h2 { margin: 8px 0; font-size: 27px; }
    .tabs { position: fixed; left: 50%; bottom: 0; z-index: 10; width: min(100%, 520px); transform: translateX(-50%); display: grid; grid-template-columns: repeat(4, 1fr); padding: 7px 6px 10px; border-top: 1px solid var(--line); background: white; box-shadow: 0 -8px 22px rgba(20, 30, 24, 0.08); }
    .tab { min-height: 54px; border-radius: 8px; background: transparent; color: var(--muted); font-size: 12px; font-weight: 800; }
    .tab.active { background: var(--soft); color: var(--brand-dark); }
    @media (max-width: 370px) { main { padding: 10px; } .hero h2 { font-size: 25px; } .actions, .filters, .toggle-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>보드게임 탐색기</h1>
      <span id="apiStatus" class="status">연결 확인 중</span>
    </header>
    <main>
      <section id="homeView" class="view active"></section>
      <section id="scanView" class="view"></section>
      <section id="recommendView" class="view"></section>
      <section id="gamesView" class="view"></section>
      <section id="detailView" class="view"></section>
    </main>
    <nav class="tabs" aria-label="주요 메뉴">
      <button class="tab active" data-view="homeView">홈</button>
      <button class="tab" data-view="scanView">스캔</button>
      <button class="tab" data-view="recommendView">추천</button>
      <button class="tab" data-view="gamesView">게임 목록</button>
    </nav>
  </div>
  <script>
    const API_BASE_URL = window.BOARDGAME_API_BASE_URL || new URLSearchParams(location.search).get('apiBase') || localStorage.getItem('boardgameApiBaseUrl') || location.origin;
    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const difficultyLabel = { easy: '쉬움', medium: '보통', hard: '어려움' };
    const state = {
      sessionId: sessionStorage.getItem('boardgameSessionId') || '',
      games: [], recommendations: [], selectedGame: null, similar: [], recognition: null,
      loading: false,
      filterTimer: null,
      recommendation: { peopleCount: 4, remainingMinutes: 45, preferredDifficulty: '', mood: '가볍게 웃기', genre: '' },
      filters: { q: '', peopleCount: '', maxPlayTime: '', difficulty: '', genre: '', beginner: false, kids: false, party: false, strategy: false },
    };

    async function api(path, options = {}) {
      const response = await fetch(API_BASE_URL + path, options);
      if (!response.ok) {
        let message = '요청을 처리하지 못했습니다.';
        try { message = (await response.json()).detail || message; } catch {}
        throw new Error(message);
      }
      return response.json();
    }

    function badges(game) {
      return [game.genre, ...(game.tags || []).slice(0, 3)].filter(Boolean).map((tag) => '<span class="badge">' + escapeHtml(tag) + '</span>').join('');
    }

    function gameCard(game, reason = '', score = null) {
      return '<article class="card"><div class="card-head"><div><h3>' + escapeHtml(game.nameKo) + '</h3><div class="meta">' + escapeHtml(game.nameEn || game.id) + '</div></div>' + (score === null ? '' : '<span class="score">' + Math.round(score) + '점</span>') + '</div><p class="meta">' + escapeHtml(game.shortDescription) + '</p><div>' + badges(game) + '</div><p class="meta">' + game.minPlayers + '-' + game.maxPlayers + '명 · 약 ' + game.avgPlayTimeMinutes + '분 · ' + escapeHtml(difficultyLabel[game.difficulty] || game.difficulty) + '</p>' + (reason ? '<p class="notice">' + escapeHtml(reason) + '</p>' : '') + '<button class="ghost" type="button" data-detail="' + escapeHtml(game.id) + '">상세 보기</button></article>';
    }

    function loadImageFile(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const url = URL.createObjectURL(file);
        image.onload = () => { URL.revokeObjectURL(url); resolve(image); };
        image.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 읽지 못했습니다.')); };
        image.src = url;
      });
    }

    async function resizeScanImage(file) {
      if (!file || !file.type.startsWith('image/')) return file;
      try {
        const image = await loadImageFile(file);
        const maxEdge = 1280;
        const longest = Math.max(image.naturalWidth, image.naturalHeight);
        const scale = Math.min(1, maxEdge / longest);
        if (scale >= 1 && file.size <= 900 * 1024) return file;
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
        canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
        const context = canvas.getContext('2d');
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.76));
        if (!blob || blob.size >= file.size) return file;
        const name = file.name.replace(/\.[^.]+$/, '') || 'boardgame';
        return new File([blob], name + '.jpg', { type: 'image/jpeg', lastModified: Date.now() });
      } catch {
        return file;
      }
    }

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach((view) => view.classList.toggle('active', view.id === viewId));
      document.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.view === viewId));
      if (viewId === 'scanView') renderScan();
      if (viewId === 'recommendView') renderRecommendations();
      if (viewId === 'gamesView') renderGames();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderHome() {
      const picks = state.recommendations.slice(0, 2).map((item) => gameCard(item.game, item.reasons?.[0] || '', item.score)).join('');
      $('homeView').innerHTML = '<section class="hero"><h2>사진으로 게임을 찾고, 다음 게임까지 골라보세요</h2><p>보드게임 자체의 특징과 내 취향을 기준으로 식별하고 추천합니다.</p><div class="actions"><button class="secondary" data-go="scanView">사진으로 찾기</button><button class="primary" data-go="recommendView">추천 받기</button></div></section><section><div class="section-title"><h2>지금의 추천</h2><span class="meta">최근 관심과 조건 반영</span></div>' + (picks || '<div class="empty">추천을 준비하고 있습니다.</div>') + '</section>';
      bindActions();
    }

    function renderScan() {
      let result = '';
      if (state.recognition) {
        const candidates = state.recognition.candidates || [];
        result = '<section><div class="section-title"><h2>인식 결과</h2><span class="meta">' + candidates.length + '개 후보</span></div><div class="notice">' + escapeHtml(state.recognition.message) + '</div>' + candidates.map((candidate) => '<article class="card"><div class="card-head"><div><h3>' + escapeHtml(candidate.game.nameKo) + '</h3><div class="meta">' + escapeHtml(candidate.evidence || candidate.game.shortDescription) + '</div></div><span class="score">' + Math.round(candidate.confidence * 100) + '%</span></div><div class="actions"><button class="ghost" data-detail="' + escapeHtml(candidate.game.id) + '">상세 보기</button><button class="primary" data-confirm="' + escapeHtml(candidate.game.id) + '">이 게임 맞아요</button></div></article>').join('') + '</section>';
      }
      $('scanView').innerHTML = '<div class="scan-stage"><div><strong>보드게임 박스나 구성품을 찍어보세요</strong><span class="meta">제목, 로고와 구성품을 분석해 게임 후보를 찾습니다.</span></div></div><section class="panel"><form id="scanForm" class="form-grid"><div><label for="scanFile">사진</label><input id="scanFile" type="file" accept="image/jpeg,image/png,image/webp"></div><div><label for="scanHint">게임명 힌트</label><input id="scanHint" type="search" placeholder="예: 스플렌더, 보석 토큰"></div><button class="primary" type="submit">' + (state.loading ? '분석 중' : '분석하기') + '</button></form></section>' + result;
      $('scanForm').onsubmit = submitScan;
      bindActions();
    }

    async function submitScan(event) {
      event.preventDefault();
      const file = $('scanFile').files[0];
      const hint = $('scanHint').value.trim();
      if (!file && !hint) return alert('사진 또는 게임명 힌트를 입력해 주세요.');
      state.loading = true; renderScan();
      const params = new URLSearchParams();
      if (hint) params.set('hint', hint);
      if (state.sessionId) params.set('sessionId', state.sessionId);
      const form = new FormData();
      if (file) {
        const uploadFile = await resizeScanImage(file);
        form.append('image', uploadFile, uploadFile.name);
      }
      try { state.recognition = await api('/recognitions?' + params.toString(), { method: 'POST', body: form }); }
      catch (error) { state.recognition = { candidates: [], message: error.message }; }
      finally { state.loading = false; renderScan(); }
    }

    async function confirmRecognition(gameId) {
      if (!state.recognition?.recognitionId) return;
      await api('/recognitions/' + encodeURIComponent(state.recognition.recognitionId) + '/confirm', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ selectedGameId: gameId, sessionId: state.sessionId || null }) });
      await openDetail(gameId);
    }

    function recommendationPayload() {
      const r = state.recommendation;
      return { sessionId: state.sessionId || null, peopleCount: Number(r.peopleCount) || null, remainingMinutes: Number(r.remainingMinutes) || null, mood: r.mood || null, preferredDifficulty: r.preferredDifficulty || null, preferredGenres: r.genre ? [r.genre] : [], limit: 5 };
    }

    async function loadRecommendations() {
      const data = await api('/recommendations', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(recommendationPayload()) });
      state.recommendations = data.items || [];
    }

    function renderRecommendations() {
      const r = state.recommendation;
      $('recommendView').innerHTML = '<section class="panel"><div class="section-title"><h2>추천 조건</h2><span class="meta">취향 기록 반영</span></div><div class="filters"><div><label for="recPeople">인원</label><input id="recPeople" type="number" min="1" max="20" value="' + r.peopleCount + '"></div><div><label for="recTime">가능 시간</label><select id="recTime"><option value="20">20분</option><option value="30">30분</option><option value="45">45분</option><option value="60">60분</option><option value="120">120분</option></select></div><div><label for="recDifficulty">난이도</label><select id="recDifficulty"><option value="">상관없음</option><option value="easy">쉬움</option><option value="medium">보통</option><option value="hard">어려움</option></select></div><div><label for="recGenre">장르</label><select id="recGenre"><option value="">전체</option><option value="party">파티</option><option value="strategy">전략</option><option value="puzzle">퍼즐</option><option value="family">가족</option><option value="cooperative">협력</option></select></div></div><div style="margin-top:10px"><label for="recMood">분위기</label><select id="recMood"><option>가볍게 웃기</option><option>대화 많이</option><option>머리 쓰기</option><option>차분하게</option><option>함께 깨기</option></select></div><button id="refreshRecommendations" class="primary" type="button" style="width:100%;margin-top:10px">추천 새로 받기</button></section><section><div class="section-title"><h2>추천 결과</h2><span class="meta">' + state.recommendations.length + '개</span></div>' + state.recommendations.map((item) => gameCard(item.game, item.reasons?.[0] || '', item.score)).join('') + '</section>';
      $('recTime').value = String(r.remainingMinutes); $('recDifficulty').value = r.preferredDifficulty; $('recGenre').value = r.genre; $('recMood').value = r.mood;
      $('refreshRecommendations').onclick = async () => { state.recommendation = { peopleCount: $('recPeople').value, remainingMinutes: $('recTime').value, preferredDifficulty: $('recDifficulty').value, genre: $('recGenre').value, mood: $('recMood').value }; await loadRecommendations(); renderRecommendations(); renderHome(); };
      bindActions();
    }

    function filteredGames() {
      return state.games.filter((game) => {
        const f = state.filters;
        const text = (game.nameKo + ' ' + (game.nameEn || '') + ' ' + game.genre + ' ' + (game.tags || []).join(' ')).toLowerCase();
        return (!f.q || text.includes(f.q.toLowerCase())) && (!f.peopleCount || game.minPlayers <= Number(f.peopleCount) && game.maxPlayers >= Number(f.peopleCount)) && (!f.maxPlayTime || game.avgPlayTimeMinutes <= Number(f.maxPlayTime)) && (!f.difficulty || game.difficulty === f.difficulty) && (!f.genre || game.genre === f.genre) && (!f.beginner || game.isBeginnerFriendly) && (!f.kids || game.isKidFriendly) && (!f.party || game.isPartyGame) && (!f.strategy || game.isStrategyGame);
      });
    }

    function renderGames() {
      const f = state.filters; const list = filteredGames();
      $('gamesView').innerHTML = '<section class="panel"><div class="section-title"><h2>보드게임 DB</h2><span class="meta">' + list.length + '개</span></div><div><label for="gameQuery">검색</label><input id="gameQuery" type="search" placeholder="게임명, 장르, 태그" value="' + escapeHtml(f.q) + '"></div><div class="filters"><div><label for="gamePeople">인원</label><select id="gamePeople"><option value="">전체</option><option value="2">2명</option><option value="3">3명</option><option value="4">4명</option><option value="5">5명</option></select></div><div><label for="gameTime">시간</label><select id="gameTime"><option value="">전체</option><option value="20">20분 안</option><option value="30">30분 안</option><option value="45">45분 안</option><option value="60">60분 안</option></select></div><div><label for="gameDifficulty">난이도</label><select id="gameDifficulty"><option value="">전체</option><option value="easy">쉬움</option><option value="medium">보통</option><option value="hard">어려움</option></select></div><div><label for="gameGenre">장르</label><select id="gameGenre"><option value="">전체</option><option value="party">파티</option><option value="strategy">전략</option><option value="puzzle">퍼즐</option><option value="family">가족</option><option value="cooperative">협력</option></select></div></div><div class="toggle-row"><button class="toggle ' + (f.beginner ? 'active' : '') + '" data-filter="beginner">초보자 추천</button><button class="toggle ' + (f.kids ? 'active' : '') + '" data-filter="kids">아이와 가능</button><button class="toggle ' + (f.party ? 'active' : '') + '" data-filter="party">파티 게임</button><button class="toggle ' + (f.strategy ? 'active' : '') + '" data-filter="strategy">전략 게임</button></div></section><section>' + (list.length ? list.map((game) => gameCard(game)).join('') : '<div class="empty">조건에 맞는 게임이 없습니다.</div>') + '</section>';
      $('gamePeople').value = f.peopleCount; $('gameTime').value = f.maxPlayTime; $('gameDifficulty').value = f.difficulty; $('gameGenre').value = f.genre;
      $('gameQuery').oninput = (event) => { state.filters.q = event.target.value; clearTimeout(state.filterTimer); state.filterTimer = setTimeout(renderGames, 180); };
      [['gamePeople','peopleCount'],['gameTime','maxPlayTime'],['gameDifficulty','difficulty'],['gameGenre','genre']].forEach(([id,key]) => $(id).onchange = (event) => { state.filters[key] = event.target.value; renderGames(); });
      document.querySelectorAll('[data-filter]').forEach((button) => button.onclick = () => { state.filters[button.dataset.filter] = !state.filters[button.dataset.filter]; renderGames(); });
      bindActions();
    }

    async function openDetail(gameId) {
      const [game, similar] = await Promise.all([api('/games/' + encodeURIComponent(gameId)), api('/games/' + encodeURIComponent(gameId) + '/similar')]);
      state.selectedGame = game; state.similar = similar.items || [];
      await postEvent('game_view', gameId);
      renderDetail(); switchView('detailView');
    }

    function renderDetail() {
      const game = state.selectedGame; if (!game) return;
      $('detailView').innerHTML = '<section class="detail-head"><button class="ghost" type="button" data-go="gamesView">뒤로</button><h2>' + escapeHtml(game.nameKo) + '</h2><p>' + escapeHtml(game.shortDescription) + '</p></section><section class="panel"><h3>한눈에 보기</h3><div>' + badges(game) + '</div><p class="meta">' + game.minPlayers + '-' + game.maxPlayers + '명 · 약 ' + game.avgPlayTimeMinutes + '분 · ' + escapeHtml(difficultyLabel[game.difficulty] || game.difficulty) + '</p></section><section class="panel"><h3>규칙 요약</h3><p class="meta">' + escapeHtml(game.rulesSummary) + '</p></section><section><div class="section-title"><h2>비슷한 게임</h2><span class="meta">' + state.similar.length + '개</span></div>' + (state.similar.length ? state.similar.map((item) => gameCard(item.game, item.relationType)).join('') : '<div class="empty">등록된 유사 게임이 없습니다.</div>') + '</section>';
      bindActions();
    }

    async function postEvent(eventType, gameId) {
      try { await api('/events', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ sessionId: state.sessionId || null, eventType, gameId, payload: {} }) }); } catch {}
    }

    function bindActions() {
      document.querySelectorAll('[data-go]').forEach((button) => button.onclick = () => switchView(button.dataset.go));
      document.querySelectorAll('[data-detail]').forEach((button) => button.onclick = () => openDetail(button.dataset.detail));
      document.querySelectorAll('[data-confirm]').forEach((button) => button.onclick = () => confirmRecognition(button.dataset.confirm));
    }

    async function initialize() {
      try {
        const health = await api('/health');
        $('apiStatus').textContent = health.status === 'ok' ? 'API 연결됨' : '연결 확인 필요';
        if (!state.sessionId) { const session = await api('/sessions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ deviceLabel: 'mobile-web' }) }); state.sessionId = session.sessionId; sessionStorage.setItem('boardgameSessionId', state.sessionId); }
        const games = await api('/games?limit=100'); state.games = games.items || [];
        await loadRecommendations();
      } catch (error) { $('apiStatus').textContent = 'API 연결 실패'; }
      renderHome(); renderScan(); renderRecommendations(); renderGames();
    }

    document.querySelectorAll('.tab').forEach((tab) => tab.onclick = () => switchView(tab.dataset.view));
    initialize();
  </script>
</body>
</html>
